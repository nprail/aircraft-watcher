version: "3.9"

services:
  aircraft-watcher:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DEDUPER_STATE_FILE=/app/data/.deduper-state.json
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
